name: Figma — Design Diff Check

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours
  workflow_dispatch:

jobs:
  figma-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run figma agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_API_TOKEN: ${{ secrets.FIGMA_API_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
        run: |
          npx claude -p agents/figma.md \
            --input '{"trigger_type":"schedule","trigger_label":"figma-diff-check"}' \
            --output-format json
