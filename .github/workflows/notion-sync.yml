name: Notion Sync — Truth Cache

on:
  schedule:
    - cron: "50 * * * *"   # runs at :50 every hour, 10 min before truth-catcher
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run notion-sync agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_DATABASE_ID: ${{ secrets.NOTION_ROOT_DATABASE_ID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
        run: |
          npx claude -p agents/notion-sync.md \
            --input '{"trigger_type":"schedule","trigger_label":"pre-scan-notion-sync"}' \
            --output-format json
