name: Truth Catcher — Hourly Scan

on:
  schedule:
    - cron: "0 * * * *"    # runs at :00 every hour, after notion-sync at :50
  workflow_dispatch:

jobs:
  truth-catcher:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run truth-catcher agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_DATABASE_ID: ${{ secrets.NOTION_ROOT_DATABASE_ID }}
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
        run: |
          npx claude -p agents/truth-catcher.md \
            --input '{"trigger_type":"schedule","trigger_label":"hourly-scan","mode":"batch","limit":50}' \
            --output-format json
